<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Educational Game</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="math.css">
        <link rel="stylesheet" href="math-background.css">
        <link rel="stylesheet" href="result.css">
        <script src="math.js" defer></script>
    </head>

    <body>
       <div class="score-board">
            <p id="score">Score: </p>
       </div>

       <div class="question">
         <h1 id="question-value">Question: </h1>
       </div>

       <div class="choice-box">
         <button class="choice" id="0">A: </button>
         <button class="choice" id="1">B: </button>
         <button class="choice" id="2">C: </button>
         <button class="choice" id="3">D: </button>
       </div>

       <div class="incorrect" style="background-color: #e74c3c;">
          <h1 class="answer-header">Incorrect</h1>
          <div class="answer">Answer: </div>
          <button class="next">Next</button>
       </div>
       
       <div class="correct" style="background-color: #26c281;">
          <h1 class="answer-header">Correct</h1>
          <div class="answer">Answer: </div>
          <button class="next">Next</button>
       </div>
       <div class="result-page">
         <div class="result-title">
               <h1>Results</h1>
               <h2>Nice Job!</h2>
         </div>
         <p class="result">You got: </p>
         <div class="buttons">
               <button id="english">English</button>
               <button id="home">Home Page</button>
               <button id="again">Try Again?</button>
         </div>
      </div>

    </body>
</html>
