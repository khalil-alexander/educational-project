<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Educational Game</title>
        <link rel="stylesheet" href="math-options.css">
        <link rel="stylesheet" href="../math-background.css">
        <script src="./interactive.js" defer></script>
        
    </head>
    <body>
        <h1 id="title">Select an option</h1>
        <h2 id="test-header">Test yourself</h2>
        <div id="test">
            <button class="choice" id="quiz">Quiz</button>
            <button class="choice" id="timed">Timed</button>
        </div>

        <h2 id="learn-header">Learn</h2>
        <div id="learn">
            <button class="choice" id="add">Long Addition</button>
            <button class="choice" id="sub">Long Subtraction</button>
            <button class="choice" id="mult">Long Multiplication</button>
        </div>
        
    </body>
